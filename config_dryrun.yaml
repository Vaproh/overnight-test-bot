# Dryrun config - fast timings, short test
mode: api

transport:
  primary: curl
  verify_with: []
  compare_all: false

proxy:
  enabled: false

user_agents:
  mode: android_only

retry:
  enabled: false
  attempts: 1

request_timeout: 10

random_sleep_min: 2
random_sleep_max: 5
per_account_delay_min: 1
per_account_delay_max: 2
jitter: 0.1

logging_level: DEBUG
save_raw_responses: true
save_response_headers: true

screenshots:
  enabled: false

output_dir: "./output_dryrun"
database_path: "./output_dryrun/monitor.db"
raw_responses_dir: "./output_dryrun/raw_responses"
logs_dir: "./output_dryrun/logs"

checkpoint_interval: 10
heartbeat_interval: 30

max_runtime_hours: 0
keep_running_after_failures: true

accounts:
  - username: "instagram"
  - username: "thisaccountdoesnotexist123456789xyz"
