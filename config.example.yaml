# Instagram Account Visibility Monitor - Configuration
# Copy this to config.yaml and edit: cp config.example.yaml config.yaml

# Mode: api | playwright
mode: api

# Transport: curl | pycurl | curl_cffi
transport:
  primary: curl
  verify_with: []           # e.g. [pycurl, curl_cffi] - verify transitions with these
  compare_all: false        # true = run ALL transports every check (for comparison)

# Proxy
proxy:
  enabled: false
  server: ""                # e.g. "http://gw.dataimpulse.com:823"
  username: ""
  password: ""

# User agents (Android only for now - most reliable)
user_agents:
  mode: android_only        # android_only | fixed | custom
  # fixed: "Instagram 320.0.0.0 Android"
  # list:
  #   - "Instagram 320.0.0.0 Android"

# Retry
retry:
  enabled: true
  attempts: 3
  backoff_seconds:
    - 5
    - 15
    - 45

# Request settings
request_timeout: 30

# Timing
random_sleep_min: 30
random_sleep_max: 90
per_account_delay_min: 5
per_account_delay_max: 15
jitter: 0.2

# Logging
logging_level: INFO
save_raw_responses: true
save_response_headers: true

# Screenshots (playwright verification only)
screenshots:
  enabled: false
  dir: "./output/screenshots"
  on_transition: true
  on_error: true

# Storage
output_dir: "./output"
database_path: "./output/monitor.db"
raw_responses_dir: "./output/raw_responses"
logs_dir: "./output/logs"

# Checkpoint
checkpoint_interval: 60
heartbeat_interval: 300

# Runtime
max_runtime_hours: 0
keep_running_after_failures: true

# Accounts to monitor
accounts:
  - username: "test_account_1"
  - username: "test_account_2"
  - username: "test_account_3"
