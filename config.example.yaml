# Instagram Account Visibility Monitor - Configuration
# Copy this to config.yaml and edit: cp config.example.yaml config.yaml

# Mode: api_direct | api_proxy | playwright_direct | playwright_proxy
mode: api_direct

# Proxy settings
proxy:
  enabled: false
  server: ""        # e.g. "http://gate.smartproxy.com:7000"
  username: ""
  password: ""

# Request settings
request_timeout: 30
retry_count: 3
retry_backoff: 2.0

# Timing
random_sleep_min: 30
random_sleep_max: 90
per_account_delay_min: 5
per_account_delay_max: 15
jitter: 0.2

# User agent
user_agent_rotation:
  - "Instagram 320.0.0.0 Android"
  - "Instagram 319.0.0.0 Android"
  - "Instagram 318.0.0.0 Android"
  - "Instagram 317.0.0.0 Android"
  - "Instagram 316.0.0.0 Android"
  - "Instagram 315.0.0.0 Android"
  - "Instagram 314.0.0.0 Android"
  - "Instagram 313.0.0.0 Android"
  - "Instagram 275.0.0.27.98 Android"
  - "Instagram 269.0.0.18.75 Android"
fixed_user_agent: ""

# Logging
logging_level: INFO
save_raw_responses: true
save_response_headers: true
save_screenshots: false
screenshot_on_unknown: true
screenshot_on_error: true
screenshot_on_transition: true

# Storage
output_dir: "./output"
database_path: "./output/monitor.db"
raw_responses_dir: "./output/raw_responses"
screenshots_dir: "./output/screenshots"
logs_dir: "./output/logs"

# Checkpoint
checkpoint_interval: 60
heartbeat_interval: 300

# Runtime
max_runtime_hours: 0
auto_restart: true
keep_running_after_failures: true
concurrency: 1

# Accounts to monitor
accounts:
  - username: "test_account_1"
  - username: "test_account_2"
  - username: "test_account_3"
